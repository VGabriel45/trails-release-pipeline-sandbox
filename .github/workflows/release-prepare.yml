name: Release (prepare)

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: "Override the released version, e.g. 1.0.0 (leave blank for automatic)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.TRAILS_SDK_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.TRAILS_SDK_RELEASE_BOT_PRIVATE_KEY }}
          owner: VGabriel45
          repositories: trails-release-pipeline-sandbox

      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_AS: ${{ inputs.release_as }}
        run: node scripts/prepare-release.mjs
