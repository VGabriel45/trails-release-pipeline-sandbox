name: Release (prepare)

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: "Override version: a single semver (e.g. 1.0.0) applies to all packages, or per-package 'name@1.0.0 other@0.4.0'. Blank = automatic."
        required: false
        default: ""
      packages:
        description: "Which package(s) to include in this release"
        type: choice
        default: All modified packages
        options:
          - All modified packages
          # Add new publishable packages here when the monorepo grows.
          - "@vgabriel45/demo-sdk"
          - "@vgabriel45/demo-utils"

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.TRAILS_SDK_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.TRAILS_SDK_RELEASE_BOT_PRIVATE_KEY }}
          # owner/repositories omitted → token is scoped to the current repo.

      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          RELEASE_AS: ${{ inputs.release_as }}
          RELEASE_PACKAGES: ${{ inputs.packages }}
        run: node scripts/prepare-release.mjs
