name: AI Changeset

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: [master]

concurrency:
  group: ai-changeset-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'trails-sdk-release-bot[bot]' &&
      !startsWith(github.event.pull_request.head.ref, 'changeset-bot/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.TRAILS_SDK_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.TRAILS_SDK_RELEASE_BOT_PRIVATE_KEY }}
          owner: VGabriel45
          repositories: trails-release-pipeline-sandbox

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate changeset
        env:
          BASE_BRANCH: master
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai-changeset.mjs

      - name: Commit changeset to PR branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "trails-sdk-release-bot[bot]"
          git config user.email "4181013+trails-sdk-release-bot[bot]@users.noreply.github.com"
          git add .changeset/pr-${{ github.event.pull_request.number }}.md
          if git diff --cached --quiet; then
            echo "No changeset changes to commit."
            exit 0
          fi
          git commit -m "chore(changeset): update for #${{ github.event.pull_request.number }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
