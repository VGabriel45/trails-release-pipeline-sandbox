name: Publish release

on:
  push:
    branches: [production]
  # workflow_dispatch is ONLY for canary snapshots (ephemeral, @canary dist-tag,
  # never moves `latest`). A real release publishes exclusively via a push to
  # production, i.e. an admin merging the master -> production release PR.
  workflow_dispatch:
    inputs:
      packages:
        description: "Which package(s) to include in the canary"
        type: choice
        default: All modified packages
        options:
          - All modified packages
          # Add new publishable packages here when the monorepo grows.
          - "@vgabriel45/demo-sdk"
          - "@vgabriel45/demo-utils"

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-publish-${{ github.event_name == 'workflow_dispatch' && 'canary' || 'production' }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    # Only a push to production (the merged master -> production release PR)
    # can publish a real release. Never triggerable manually.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish release to npm
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-release.mjs

  publish-canary:
    name: Publish canary
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish canary snapshot to npm
        env:
          RELEASE_PACKAGES: ${{ inputs.packages }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/run-canary.mjs
