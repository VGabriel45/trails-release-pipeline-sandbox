name: Release (publish)

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
        # When NPM_TOKEN is unset, setup-node uses npm OIDC (requires trusted publisher on npm).

      - run: pnpm install --frozen-lockfile

      - name: Publish to npm
        env:
          GH_TOKEN: ${{ github.token }}
          # Optional fallback — do NOT set NODE_AUTH_TOKEN here; an empty value disables OIDC.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-release.mjs
