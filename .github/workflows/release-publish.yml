name: Publish release

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      mode:
        description: "Manual run mode"
        type: choice
        default: canary
        options:
          - canary
          - retry-production
      packages:
        description: "Which package(s) to include in the canary"
        type: choice
        default: All modified packages
        options:
          - All modified packages
          # Add new publishable packages here when the monorepo grows.
          - "@vgabriel45/demo-sdk"
          - "@vgabriel45/demo-utils"

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-publish-${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'production' }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    # Real releases run on production pushes. Manual mode exists only for admin
    # retries of a failed production publish against the current production tip.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'retry-production')
    runs-on: ubuntu-latest
    steps:
      - name: Authorize manual production retry (admins only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq .permission)
          if [ "$PERM" != "admin" ]; then
            echo "Manual production publish retry is admin-only (actor=${{ github.actor }}, permission=$PERM)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'production' || github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish release to npm
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-release.mjs

  publish-canary:
    name: Publish canary
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'canary'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish canary snapshot to npm
        env:
          RELEASE_PACKAGES: ${{ inputs.packages }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/run-canary.mjs
