name: Publish release

on:
  push:
    branches: [production]
  # workflow_dispatch is ONLY for canary snapshots (ephemeral, @canary dist-tag,
  # never moves `latest`). A real release publishes exclusively via a push to
  # production, i.e. an admin merging the master -> production release PR.
  workflow_dispatch:
    inputs:
      mode:
        description: "Manual run mode"
        type: choice
        default: canary
        options:
          - canary
          - retry-production
      packages:
        description: "Which package(s) to include in the canary"
        type: choice
        default: All modified packages
        options:
          - All modified packages
          # Add new publishable packages here when the monorepo grows.
          - "@vgabriel45/demo-sdk"
          - "@vgabriel45/demo-utils"

permissions:
  id-token: write
  contents: write

concurrency:
  # Keep production push + retry-production in the same lock to avoid races.
  # Only canary gets its own group.
  group: release-publish-${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'canary' && 'canary' || 'production' }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    # Real releases run on production pushes. Manual mode exists only for admin
    # retries of a failed production publish against the current production tip.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'retry-production')
    runs-on: ubuntu-latest
    steps:
      - name: Authorize manual production retry (admins only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq .permission)
          if [ "$PERM" != "admin" ]; then
            echo "Manual production publish retry is admin-only (actor=${{ github.actor }}, permission=$PERM)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'production' || github.ref_name }}
          fetch-depth: 0

      - name: Detect version bumps in this production push
        id: bump-check
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node <<'NODE'
          const { execSync } = require("node:child_process");
          const { readFileSync, readdirSync, statSync, appendFileSync } = require("node:fs");
          const { join } = require("node:path");

          const before = process.env.BEFORE_SHA;
          const output = process.env.GITHUB_OUTPUT;
          const root = process.cwd();
          const config = JSON.parse(readFileSync(join(root, ".changeset/config.json"), "utf8"));
          const ignored = new Set(config.ignore ?? []);
          const ZERO_SHA = /^0{40}$/;

          if (!before || ZERO_SHA.test(before)) {
            console.log("Production branch creation/reset event detected (before SHA is zero). Skipping publish auto-detection for this push.");
            appendFileSync(output, "publish=false\n");
            process.exit(0);
          }

          let shouldPublish = false;
          const changed = [];
          for (const entry of readdirSync("packages")) {
            const pkgDir = join("packages", entry);
            if (!statSync(pkgDir).isDirectory()) continue;
            const pkgPath = join(pkgDir, "package.json");
            let current;
            try {
              current = JSON.parse(readFileSync(pkgPath, "utf8"));
            } catch {
              continue;
            }
            if (current.private === true) continue;
            if (ignored.has(current.name)) continue;

            let previous;
            try {
              previous = JSON.parse(execSync(`git show ${before}:${pkgPath}`, { encoding: "utf8" }));
            } catch {
              // New package or missing prior manifest: publish to be safe.
              shouldPublish = true;
              changed.push(`${current.name}: <new> -> ${current.version}`);
              continue;
            }

            if (previous.version !== current.version) {
              shouldPublish = true;
              changed.push(`${current.name}: ${previous.version} -> ${current.version}`);
            }
          }

          if (shouldPublish) {
            console.log("Package version bumps detected:");
            for (const line of changed) console.log(`- ${line}`);
          } else {
            console.log("No publishable package version bumps detected in this production push — skipping publish.");
          }
          appendFileSync(output, `publish=${shouldPublish}\n`);
          NODE

      - uses: pnpm/action-setup@v4
        if: steps.bump-check.outputs.publish == 'true'

      - uses: actions/setup-node@v4
        if: steps.bump-check.outputs.publish == 'true'
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # --ignore-scripts: keep untrusted dependency install-time code away from the
      # OIDC-privileged runner; the build step below runs package build scripts explicitly.
      - if: steps.bump-check.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        if: steps.bump-check.outputs.publish == 'true'
        run: pnpm build

      - name: Publish release to npm
        if: steps.bump-check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/publish-release.mjs

  publish-canary:
    name: Publish canary
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'canary'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # --ignore-scripts: keep untrusted dependency install-time code away from the
      # OIDC-privileged runner; the build step below runs package build scripts explicitly.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm build

      - name: Publish canary snapshot to npm
        env:
          RELEASE_PACKAGES: ${{ inputs.packages }}
        run: node scripts/run-canary.mjs
